name: V103 #77 CRON-MACHINE

on:
  workflow_dispatch:

jobs:
  strike:
    strategy:
      matrix:
        machine_id: [1, 2, 3, 4, 5, 6, 7, 8]
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ⚡ CRITICAL: This ensures all drivers and stealth libs are ready
      - name: Install Strike Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium==4.21.0 selenium-stealth undetected-chromedriver

      - name: RUN MACHINE #77
        env:
          INSTA_COOKIE: ${{ secrets.INSTA_COOKIE }}
          TARGET_THREAD_ID: ${{ secrets.TARGET_THREAD_ID }}
          MESSAGES: ${{ secrets.MESSAGES }}
          MACHINE_ID: ${{ matrix.machine_id }}
        run: python -u praveer_v103.py
